<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/logo.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ffffff" />
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=public-sans:400,500,600,700" rel="stylesheet" />
  <title>工单处理后台</title>
  <meta name="description" content="A professional dashboard template built with Nuxt UI, featuring multiple pages, data visualization, and comprehensive management capabilities for creating powerful admin interfaces.">
  <meta property="og:title" content="Vue Dashboard Template">
  <meta property="og:description" content="A professional dashboard template built with Nuxt UI, featuring multiple pages, data visualization, and comprehensive management capabilities for creating powerful admin interfaces.">
  <meta property="og:image" content="https://ui.nuxt.com/assets/templates/vue/dashboard-light.png">
  <meta name="twitter:card" content="summary_large_image">
  <style>html { background-color: #ffffff } html.dark { background-color: #18181b }</style>
  <script>
    (function () {
      var mode = localStorage.getItem('vueuse-color-scheme') || 'auto'
      var dark = mode === 'dark' || (mode === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches)
      if (dark) {
        document.documentElement.classList.add('dark')
        document.querySelector('meta[name="theme-color"]').setAttribute('content', '#18181b')
      }
    })()
  </script>
</head>

<body>
  <div id="app" class="isolate"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
